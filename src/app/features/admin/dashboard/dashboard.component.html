<div class="dashboard">
  <h1>Dashboard</h1>
  <div class="stats">
    <mat-card class="stat-card">
      <mat-card-content>
        <mat-icon color="primary">menu</mat-icon>
        <h2>{{ menusCount }}</h2>
        <p>Total Menus</p>
      </mat-card-content>
    </mat-card>
    <mat-card class="stat-card">
      <mat-card-content>
        <mat-icon color="accent">article</mat-icon>
        <h2>{{ postsCount }}</h2>
        <p>Total Posts</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
